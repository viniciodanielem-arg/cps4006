<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout Game</title>


  <link rel="stylesheet" href="breakout.css" />
</head>
<body>


  <h1 class="header">Breakout Game</h1>


  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="600" height="400">
      <p>Your browser does not support canvas.</p>
    </canvas>
  </div>


  <p class="info">Use ◀ and ▶ arrow keys to move the paddle. Break all bricks!</p>


  <!-- Link external JavaScript (put at bottom so HTML loads first) -->
  <script src="breakout.js"></script>
</body>
</html>
