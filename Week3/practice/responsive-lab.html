<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .grid {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .box {
            flex: 1;
            padding: 30px;
            text-align: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
        }

.box-1 { background-color: #3498db; }
.box-2 { background-color: #e74c3c; }
.box-3 { background-color: #2ecc71; }

h2 {
    color: #2c3e50;
    margin-top: 40px;
    margin-bottom: 20px;
}

.image-demo {
    margin: 20px 0;
}

.image-demo img {
    max-width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
}

.image-grid {
    display: flex;
    gap: 15px;
    margin: 20px 0;
}

.image-grid img {
    flex: 1;
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    object-fit: cover;
}

/* Stack images earlier than other content */
@media (max-width: 900px) {
    .image-grid {
        flex-direction: column;
    }
}

/* Add to your mobile media query */
@media (max-width: 768px) {
    .image-grid {
        flex-direction: column;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Lesson 2: Fluid Grids</h1>
        
        <div class="grid">
            <div class="box box-1">Box 1</div>
            <div class="box box-2">Box 2</div>
            <div class="box box-3">Box 3</div>
        </div>

        <h2>Flexible Images</h2>

<div class="image-demo">
    <img src="https://picsum.photos/800/400" alt="Demo image">
    <p>This image scales down on smaller screens but never gets bigger than its original size.</p>
</div>

<div class="image-grid">
    <img src="https://picsum.photos/400/300?random=1" alt="Image 1">
    <img src="https://picsum.photos/400/300?random=2" alt="Image 2">
    <img src="https://picsum.photos/400/300?random=3" alt="Image 3">
</div>
        
        <p style="margin-top: 20px;">Resize your window and watch the boxes adapt!</p>
    </div>
</body>
</html>
