<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="style.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Quiz</title>
</head>
<body>

<header>
  <h1>Movie Quiz</h1>
</header>

<nav class="main-nav" aria-label="Main navigation">
  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="quiz.html">Quiz</a></li>
  </ul>
</nav>

<main>
  <form action="#" method="post">
    <fieldset>
      <legend>1) Who directed Inception?</legend>
      <label><input type="radio" name="q1" value="a" required> Christopher Nolan</label>
      <label><input type="radio" name="q1" value="b"> Steven Spielberg</label>
      <label><input type="radio" name="q1" value="c"> James Cameron</label>
    </fieldset>

    <fieldset>
      <legend>2) Which film features the quote “I’ll be back”?</legend>
      <label><input type="radio" name="q2" value="a" required> The Terminator</label>
      <label><input type="radio" name="q2" value="b"> Titanic</label>
      <label><input type="radio" name="q2" value="c"> Jaws</label>
    </fieldset>

    <fieldset>
      <legend>3) What is the name of the wizard school in Harry Potter?</legend>
      <label><input type="radio" name="q3" value="a" required> Hogwarts</label>
      <label><input type="radio" name="q3" value="b"> Narnia</label>
      <label><input type="radio" name="q3" value="c"> Mordor</label>
    </fieldset>

    <fieldset>
      <legend>4) Which movie is set on the planet Pandora?</legend>
      <label><input type="radio" name="q4" value="a" required> Avatar</label>
      <label><input type="radio" name="q4" value="b"> Interstellar</label>
      <label><input type="radio" name="q4" value="c"> The Matrix</label>
    </fieldset>

    <fieldset>
      <legend>5) What is the main sport in Space Jam?</legend>
      <label><input type="radio" name="q5" value="a" required> Basketball</label>
      <label><input type="radio" name="q5" value="b"> Football</label>
      <label><input type="radio" name="q5" value="c"> Tennis</label>
    </fieldset>

    <button type="submit">Submit Answers</button>
  </form>
</main>

</body>
</html>
