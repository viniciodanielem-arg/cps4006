<section>
  <h2>Movie Search</h2>

  <form action="#" method="get">
    <fieldset>
      <legend>Search Filters</legend>

      <label for="title">Movie title:</label>
      <input type="search" id="title" name="title">

      <label for="genre">Genre:</label>
      <input list="genres" id="genre" name="genre" placeholder="Choose a genre">
      <datalist id="genres">
        <option value="Action"></option>
        <option value="Comedy"></option>
        <option value="Drama"></option>
        <option value="Horror"></option>
        <option value="Sci-Fi"></option>
      </datalist>

      <label for="year">Release year:</label>
      <input type="number" id="year" name="year" min="1900" max="2026">

      <label for="rating">Minimum rating (1–10):</label>
      <input type="range" id="rating" name="rating" min="1" max="10" value="5">
      <span>5</span>

      <button type="submit">Search</button>
    </fieldset>
  </form>
</section>
